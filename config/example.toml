[target]
name = "Example SMS ROM"
model = "sms"
entry = "0x0000"

[recompiler]
fallback = true
emit_disassembly_comments = true
max_static_bytes = "0xC000"

[runtime]
region = "ntsc"
audio_sample_rate = 48000
# Set 224 or 240 only for an explicitly tested enhanced SMS profile.
viewport_height = 0
# Non-historical opt-in extension using Nuked-OPN2 on custom ports F4-F7.
enable_ym2612 = false

[run]
mode = "host"
frames = 1

# Relative paths are resolved from this TOML file. Keep local copies of this
# section under an ignored directory when they point to private material.
[paths]
input = "../local-roms/example.sms"
profile = "../out/profiles/example.txt"
frame_bmp = "../out/example.bmp"
audio = "../out/example.wav"
