name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install pinned formatter
        run: python -m pip install clang-format==19.1.7

      - name: Configure
        run: >-
          cmake -S . -B build/ci -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DSGRECOMP_WARNINGS_AS_ERRORS=ON
          -DSGRECOMP_REQUIRE_CLANG_FORMAT=ON

      - name: Check formatting
        run: cmake --build build/ci --target format-check

      - name: Build
        run: cmake --build build/ci

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure
